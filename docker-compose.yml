version: '3.8'

services:
  db-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartmarket_db
    ports:
      - "3306:3306"
    networks:
      - smartmarket-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  eureka-server:
    build: ./SmartMarket
    environment:
      - JAVA_OPTS=-Xmx128m -Xms64m
    networks:
      - smartmarket-net

  api-gateway:
    build: ./api-gateway
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx128m -Xms64m
    networks:
      - smartmarket-net

  product-service:
    build: ./product-service
    depends_on:
      db-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/smartmarket_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - JAVA_OPTS=-Xmx192m -Xms64m
    networks:
      - smartmarket-net

  client-service:
    build: ./client-service
    depends_on:
      db-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/smartmarket_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - JAVA_OPTS=-Xmx192m -Xms64m
    networks:
      - smartmarket-net

networks:
  smartmarket-net:
    driver: bridge
