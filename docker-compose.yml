version: '3.8'

services:
  db-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    networks:
      - smartmarket-net

  eureka-server:
    build: ./SmartMarket
    environment:
      - JAVA_OPTS=-Xmx256m
    networks:
      - smartmarket-net

  api-gateway:
    build: ./api-gateway
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m
    networks:
      - smartmarket-net

  product-service:
    build: ./product-service
    depends_on:
      - eureka-server
      - db-mysql
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/MAXproduct_service?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - JAVA_OPTS=-Xmx256m
    networks:
      - smartmarket-net

  client-service:
    build: ./client-service
    depends_on:
      - eureka-server
      - db-mysql
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/MAXclient_service?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - JAVA_OPTS=-Xmx256m
    networks:
      - smartmarket-net

networks:
  smartmarket-net:
    driver: bridge
