version: '3.8'

services:
  eureka-server:
    build: ./SmartMarket
    ports:
      - "${PORT:-8761}:8761"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - smartmarket-net

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - smartmarket-net

  product-service:
    build: ./product-service
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - smartmarket-net

  client-service:
    build: ./client-service
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - smartmarket-net

  vue-front:
    build: ./vue-front
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - smartmarket-net

networks:
  smartmarket-net:
    driver: bridge
