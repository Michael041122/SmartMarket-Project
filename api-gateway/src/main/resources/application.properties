spring.application.name=api-gateway
server.port=${PORT:8080}
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/productos/**
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/pedidos/**
spring.cloud.gateway.routes[2].id=client-service
spring.cloud.gateway.routes[2].uri=lb://client-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/clientes/**
spring.cloud.gateway.routes[3].id=sales-service
spring.cloud.gateway.routes[3].uri=lb://sales-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ventas/**
spring.cloud.gateway.routes[4].id=provider-service
spring.cloud.gateway.routes[4].uri=lb://provider-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/proveedores/**
spring.security.user.name=admin
spring.security.user.password=admin123
